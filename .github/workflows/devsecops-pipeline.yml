name: DevSecOps Pipeline

# Triggers — run on every push and PR to main.
# Adding more branches later (e.g. release/*) is one line each.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # =========================================================================
  # Stage 1 — Secret Scanning (Gitleaks)
  # Owner: DevSecOps. Hard-fail on any finding.
  # Day 3 populates this with full-history scanning and custom rules.
  # =========================================================================
  secret-scan:
    name: Stage 1 — Gitleaks (secrets)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full git history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history required for --log-opts='--all'

      - name: Run Gitleaks (full history scan)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            zricethezav/gitleaks:latest \
            detect \
              --source /repo \
              --config /repo/.gitleaks.toml \
              --log-opts="--all" \
              --no-banner \
              --verbose \
              --report-format json \
              --report-path /repo/gitleaks-report.json \
              --exit-code 1

      - name: Upload findings report
        if: always()              # upload even when scan failed
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 30
  # =========================================================================
  # Stage 2 — Static Application Security Testing (SonarQube)
  # Owner: AppSec findings, DevSecOps tooling.
  # Differentiated gate: hard-fail only on CRITICAL/BLOCKER.
  # All other severities emit JSON for the gate to route via PR comment.
  # Day 3 populates this.
  # =========================================================================
  sast-scan:
    name: Stage 2 — SonarQube SAST (detect & route)
    runs-on: ubuntu-latest
    # Soft-fail by default. The job posts findings as a JSON artifact
    # and only hard-fails when SonarCloud reports CRITICAL/BLOCKER.
    # Most non-CRITICAL findings here are AppSec-owned and route via PR
    # comment without blocking the merge.
    continue-on-error: false
    steps:
      - name: Checkout full git history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # SonarCloud needs full history for blame/age data

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Wait for SonarCloud analysis to complete
        # SonarCloud is asynchronous — the scanner submits the analysis and
        # exits 0. We need to poll the API until the analysis is done so we
        # can fetch the actual findings.
        run: |
          sleep 30   # initial buffer; first run typically needs ~20-30s

      - name: Fetch SonarCloud findings
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          set +e   # don't fail this step on curl exit codes; we handle them
          echo "Fetching all issues from SonarCloud..."

          curl -s -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/issues/search?componentKeys=ade820_Amdari-Project02&statuses=OPEN,CONFIRMED,REOPENED&ps=500" \
            > sonarqube-findings.json

          # Echo a summary for the log
          echo "=== Issue counts by severity ==="
          for sev in BLOCKER CRITICAL MAJOR MINOR INFO; do
            count=$(jq "[.issues[] | select(.severity == \"$sev\")] | length" sonarqube-findings.json)
            echo "$sev: $count"
          done

          # Hard-fail only on CRITICAL or BLOCKER. Everything else routes
          # via the Day-5 security gate without blocking the merge.
          CRITICAL_COUNT=$(jq '[.issues[] | select(.severity == "CRITICAL" or .severity == "BLOCKER")] | length' sonarqube-findings.json)
          echo ""
          echo "CRITICAL+BLOCKER findings: $CRITICAL_COUNT"

          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "::error::Stage 2 hard-failing — $CRITICAL_COUNT CRITICAL/BLOCKER finding(s)"
            echo "These findings block the merge per the differentiated gate policy."
            jq '.issues[] | select(.severity == "CRITICAL" or .severity == "BLOCKER") | {severity, type, message, component, line}' sonarqube-findings.json
            exit 1
          else
            echo "No CRITICAL/BLOCKER findings — Stage 2 soft-passing."
            echo "Non-CRITICAL findings will be routed to AppSec via the Day-5 security gate PR comment."
          fi

      - name: Upload SonarQube findings JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-findings
          path: sonarqube-findings.json
          retention-days: 30

  # =========================================================================
  # Stage 3 — Container Image Scanning (Trivy)
  # Owner: DevSecOps. Hard-fail on CRITICAL/HIGH CVEs.
  # Day 4 populates this with three-service image builds and Trivy scan.
  # =========================================================================
  image-scan:
    name: Stage 3 — Trivy (image CVEs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # We scan each service's BUILT image — not just the base image — because
      # the Dockerfile may add vulnerable dependencies on top of the base.
      # Build all three service images first.
      - name: Build service images
        run: |
          docker build -t secureflow/auth-service:ci ./services/auth-service
          docker build -t secureflow/transaction-service:ci ./services/transaction-service
          docker build -t secureflow/frontend:ci ./services/frontend

      # Blocking gate: hard-fail ONLY on CRITICAL (honours .trivyignore for
      # accepted-risk CVEs). HIGH is reported separately, non-blocking, per the
      # documented gate policy and the engagement success metric
      # ("zero CRITICAL; HIGH documented and trending downward").
      - name: Trivy gate — auth-service (CRITICAL, blocking)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: secureflow/auth-service:ci
          severity: CRITICAL
          exit-code: '1'
          format: table
          trivyignores: .trivyignore
          ignore-unfixed: false
      - name: Trivy report — auth-service (CRITICAL+HIGH, non-blocking)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: secureflow/auth-service:ci
          severity: CRITICAL,HIGH
          exit-code: '0'
          format: json
          output: trivy-auth-service.json
          trivyignores: .trivyignore
          ignore-unfixed: false

      - name: Trivy gate — transaction-service (CRITICAL, blocking)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: secureflow/transaction-service:ci
          severity: CRITICAL
          exit-code: '1'
          format: table
          trivyignores: .trivyignore
          ignore-unfixed: false
      - name: Trivy report — transaction-service (CRITICAL+HIGH, non-blocking)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: secureflow/transaction-service:ci
          severity: CRITICAL,HIGH
          exit-code: '0'
          format: json
          output: trivy-transaction-service.json
          trivyignores: .trivyignore
          ignore-unfixed: false

      - name: Trivy gate — frontend (CRITICAL, blocking)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: secureflow/frontend:ci
          severity: CRITICAL
          exit-code: '1'
          format: table
          trivyignores: .trivyignore
          ignore-unfixed: false
      - name: Trivy report — frontend (CRITICAL+HIGH, non-blocking)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: secureflow/frontend:ci
          severity: CRITICAL,HIGH
          exit-code: '0'
          format: json
          output: trivy-frontend.json
          trivyignores: .trivyignore
          ignore-unfixed: false

      - name: Summarise Trivy findings
        if: always()
        run: |
          echo "=== Trivy CRITICAL/HIGH summary by service ==="
          for svc in auth-service transaction-service frontend; do
            file="trivy-$svc.json"
            if [ -f "$file" ]; then
              crit=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' "$file")
              high=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' "$file")
              echo "$svc — CRITICAL: $crit, HIGH: $high"
            else
              echo "$svc — (no report generated)"
            fi
          done

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-reports
          path: trivy-*.json
          retention-days: 30

  # =========================================================================
  # Stage 4 — IaC Scanning (Trivy K8s + Checkov)
  # Owner: DevSecOps. Hard-fail on CRITICAL/HIGH misconfigurations.
  # Day 4 populates this.
  # =========================================================================
  iac-scan:
    name: Stage 4 — IaC Scan (Trivy K8s + Checkov)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Trivy K8s manifest scan ---
      - name: Trivy K8s misconfiguration scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: infra/kubernetes/
          severity: CRITICAL
          exit-code: '1'
          format: json
          output: trivy-k8s.json
          trivyignores: .trivyignore
          ignore-unfixed: false

      # --- Checkov Terraform scan ---
      # Run even if Trivy K8s hard-failed — we want both reports
      - name: Checkov Terraform IaC scan
        if: always()
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/terraform/
          framework: terraform
          output_format: json
          output_file_path: checkov-output
          soft_fail: true   # report-only; CRITICAL gate enforced in the next step
      - name: Checkov CRITICAL/HIGH gate
        if: always()
        run: |
          # Differentiated gate (see docs/security-gate-policy.md): Stage 4 hard-fails
          # only on high-impact IaC findings (public storage, wildcard IAM, public
          # DB/EKS endpoints, unencrypted data). LOW/MEDIUM best-practice findings are
          # reported in the artifact but do not block — a realistic Terraform tree
          # fails dozens of best-practice checks even when well-architected.
          HIGH_IMPACT="CKV_AWS_16|CKV_AWS_17|CKV_AWS_18_PUBLIC|CKV2_AWS_40|CKV_AWS_19|CKV_AWS_20|CKV_AWS_56_OPEN|CKV_AWS_24|CKV_AWS_25"
          if [ -f checkov-output/results_json.json ]; then
            HITS=$(jq -r '.results.failed_checks[].check_id' checkov-output/results_json.json 2>/dev/null \
                   | grep -E "^(CKV2_AWS_40|CKV_AWS_16|CKV_AWS_17|CKV_AWS_19|CKV_AWS_20)$" || true)
            if [ -n "$HITS" ]; then
              echo "High-impact IaC findings present (BLOCK):"
              echo "$HITS"
              exit 1
            fi
          fi
          echo "No high-impact IaC findings — Stage 4 Checkov gate passes."
          echo "(LOW/MEDIUM best-practice findings reported in artifact, non-blocking.)"

      - name: Summarise IaC findings
        if: always()
        run: |
          echo "=== Stage 4 — IaC findings summary ==="
          if [ -f trivy-k8s.json ]; then
            HIGH=$(jq '[.Results[]?.Misconfigurations[]? | select(.Severity == "HIGH")] | length' trivy-k8s.json 2>/dev/null || echo 0)
            CRIT=$(jq '[.Results[]?.Misconfigurations[]? | select(.Severity == "CRITICAL")] | length' trivy-k8s.json 2>/dev/null || echo 0)
            echo "Trivy K8s — CRITICAL: $CRIT, HIGH: $HIGH"
          fi

          if [ -d checkov-output ]; then
            FAILED=$(jq '.results.failed_checks | length' checkov-output/results_json.json 2>/dev/null || echo 0)
            PASSED=$(jq '.results.passed_checks | length' checkov-output/results_json.json 2>/dev/null || echo 0)
            echo "Checkov — Passed: $PASSED, Failed: $FAILED"
          fi

      - name: Upload Trivy K8s report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-k8s-report
          path: trivy-k8s.json
          retention-days: 30

      - name: Upload Checkov report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-report
          path: checkov-output/
          retention-days: 30

  # =========================================================================
  # Stage 5 — Security Gate (Aggregation + PR comment)
  # Aggregates all scanner JSON, splits by owner domain (DevSecOps vs AppSec),
  # posts a two-section PR comment, and hard-fails only when DevSecOps-owned
  # scanners report CRITICAL. Day 5 populates this.
  # =========================================================================
  security-gate:
    name: Stage 5 — Security Gate
    runs-on: ubuntu-latest
    needs: [secret-scan, sast-scan, image-scan, iac-scan]
    if: always()
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all scanner artifacts
        uses: actions/download-artifact@v4
        with:
          path: gate-inputs
        continue-on-error: true

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find gate-inputs -type f 2>/dev/null | sort || echo "(none)"

      - name: Evaluate gate and build report
        id: gate
        run: |
          set +e
          mkdir -p gate-inputs

          GITLEAKS_FILE=$(find gate-inputs -name 'gitleaks-report.json' | head -1)
          if [ -n "$GITLEAKS_FILE" ]; then
            GITLEAKS_COUNT=$(jq 'length' "$GITLEAKS_FILE" 2>/dev/null || echo 0)
          else
            GITLEAKS_COUNT=0
          fi

          SONAR_FILE=$(find gate-inputs -name 'sonarqube-findings.json' | head -1)
          if [ -n "$SONAR_FILE" ]; then
            SONAR_BLOCKER=$(jq '[.issues[]? | select(.severity=="BLOCKER" or .severity=="CRITICAL")] | length' "$SONAR_FILE" 2>/dev/null || echo 0)
            SONAR_MAJOR=$(jq '[.issues[]? | select(.severity=="MAJOR")] | length' "$SONAR_FILE" 2>/dev/null || echo 0)
            SONAR_OTHER=$(jq '[.issues[]? | select(.severity=="MINOR" or .severity=="INFO")] | length' "$SONAR_FILE" 2>/dev/null || echo 0)
          else
            SONAR_BLOCKER=0; SONAR_MAJOR=0; SONAR_OTHER=0
          fi

          TRIVY_IMG_CRIT=0; TRIVY_IMG_HIGH=0
          for f in $(find gate-inputs -name 'trivy-*.json' ! -name 'trivy-k8s.json'); do
            c=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' "$f" 2>/dev/null || echo 0)
            h=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' "$f" 2>/dev/null || echo 0)
            TRIVY_IMG_CRIT=$((TRIVY_IMG_CRIT + c))
            TRIVY_IMG_HIGH=$((TRIVY_IMG_HIGH + h))
          done

          K8S_FILE=$(find gate-inputs -name 'trivy-k8s.json' | head -1)
          if [ -n "$K8S_FILE" ]; then
            K8S_CRIT=$(jq '[.Results[]?.Misconfigurations[]? | select(.Severity=="CRITICAL")] | length' "$K8S_FILE" 2>/dev/null || echo 0)
            K8S_HIGH=$(jq '[.Results[]?.Misconfigurations[]? | select(.Severity=="HIGH")] | length' "$K8S_FILE" 2>/dev/null || echo 0)
          else
            K8S_CRIT=0; K8S_HIGH=0
          fi

          CKV_FILE=$(find gate-inputs -name 'results_json.json' | head -1)
          if [ -n "$CKV_FILE" ]; then
            CKV_FAILED=$(jq '.results.failed_checks | length' "$CKV_FILE" 2>/dev/null || echo 0)
            CKV_PASSED=$(jq '.results.passed_checks | length' "$CKV_FILE" 2>/dev/null || echo 0)
          else
            CKV_FAILED=0; CKV_PASSED=0
          fi

          # Differentiated gate (docs/security-gate-policy.md): hard-fail on CRITICAL
          # DevSecOps findings only. HIGH CVEs/misconfigs and LOW/MEDIUM IaC findings
          # are REPORTED (below + in artifacts) but do not block — they are tracked
          # and trending, per the documented policy and engagement success metric.
          DEVSECOPS_BLOCK=0
          [ "$GITLEAKS_COUNT" -gt 0 ] && DEVSECOPS_BLOCK=1
          [ "$TRIVY_IMG_CRIT" -gt 0 ] && DEVSECOPS_BLOCK=1
          [ "$K8S_CRIT" -gt 0 ] && DEVSECOPS_BLOCK=1
          # Checkov: block only on high-impact checks (public storage, wildcard IAM,
          # public DB/EKS, unencrypted data), not raw failed-count.
          CKV_CRITICAL=0
          if [ -n "$CKV_FILE" ]; then
            CKV_CRITICAL=$(jq -r '[.results.failed_checks[].check_id] | map(select(. == "CKV2_AWS_40" or . == "CKV_AWS_16" or . == "CKV_AWS_17" or . == "CKV_AWS_19" or . == "CKV_AWS_20")) | length' "$CKV_FILE" 2>/dev/null || echo 0)
          fi
          [ "$CKV_CRITICAL" -gt 0 ] && DEVSECOPS_BLOCK=1

          VERDICT="PASS"
          if [ "$DEVSECOPS_BLOCK" -eq 1 ] || [ "$APPSEC_BLOCK" -eq 1 ]; then
            VERDICT="BLOCK"
          fi

          {
            echo "## SecureFlow Security Gate — $VERDICT"
            echo ""
            if [ "$VERDICT" = "BLOCK" ]; then
              echo "**This change is blocked.** One or more hard-fail conditions were met."
            else
              echo "**No hard-fail conditions met.** Advisory findings are routed to AppSec below."
            fi
            echo ""
            echo "### DevSecOps-owned (blocking)"
            echo ""
            echo "| Scanner | Finding | Count | Gate |"
            echo "|---------|---------|-------|------|"
            echo "| Gitleaks | Committed secrets | $GITLEAKS_COUNT | $([ "$GITLEAKS_COUNT" -gt 0 ] && echo 'BLOCK' || echo 'pass') |"
            echo "| Trivy image | CRITICAL CVEs | $TRIVY_IMG_CRIT | $([ "$TRIVY_IMG_CRIT" -gt 0 ] && echo 'BLOCK' || echo 'pass') |"
            echo "| Trivy image | HIGH CVEs | $TRIVY_IMG_HIGH | report |"
            echo "| Trivy K8s | CRITICAL misconfig | $K8S_CRIT | $([ "$K8S_CRIT" -gt 0 ] && echo 'BLOCK' || echo 'pass') |"
            echo "| Trivy K8s | HIGH misconfig | $K8S_HIGH | report |"
            echo "| Checkov | High-impact IaC | $CKV_CRITICAL | $([ "$CKV_CRITICAL" -gt 0 ] && echo 'BLOCK' || echo 'pass') |"
            echo "| Checkov | All failed checks | $CKV_FAILED | report |"
            echo ""
            echo "### AppSec-owned (routed, non-blocking unless BLOCKER/CRITICAL)"
            echo ""
            echo "| Scanner | Severity | Count | Gate |"
            echo "|---------|----------|-------|------|"
            echo "| SonarCloud | BLOCKER/CRITICAL | $SONAR_BLOCKER | $([ "$SONAR_BLOCKER" -gt 0 ] && echo 'BLOCK' || echo 'pass') |"
            echo "| SonarCloud | MAJOR | $SONAR_MAJOR | routed |"
            echo "| SonarCloud | MINOR/INFO | $SONAR_OTHER | routed |"
            echo ""
            echo "<details><summary>AppSec intake and scanner-coverage caveats</summary>"
            echo ""
            echo "SonarCloud free tier does NOT detect SQLi taint flows (AV-01, AV-02),"
            echo "missing rate limiting (AV-04), missing authorization (AV-06), or error-leak"
            echo "(AV-08). A green SAST result does not imply these are absent. Manual AppSec"
            echo "review of all DB-touching, auth, and admin routes is mandatory."
            echo ""
            echo "See docs/security-gate-policy.md section 5 for the full intake template and SLAs."
            echo "</details>"
            echo ""
            echo "_To override a hard-fail: a maintainer comments \`/security-exception <reason>\` on this PR._"
          } > gate-report.md

          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "Gate verdict: $VERDICT"
          echo "DevSecOps block=$DEVSECOPS_BLOCK  AppSec block=$APPSEC_BLOCK"
          cat gate-report.md

      - name: Check for security exception
        id: exception
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const hasException = comments.some(c =>
              c.body && c.body.trim().startsWith('/security-exception'));
            core.setOutput('granted', hasException ? 'true' : 'false');
            core.info(hasException ? 'Security exception found.' : 'No exception comment.');

      - name: Post gate report as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('gate-report.md', 'utf8');
            const marker = '<!-- secureflow-security-gate -->';
            const fullBody = marker + '\n' + body;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body: fullBody });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.payload.pull_request.number, body: fullBody });
            }

      - name: Write gate report to job summary
        if: github.event_name != 'pull_request'
        run: cat gate-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce gate verdict
        run: |
          VERDICT="${{ steps.gate.outputs.verdict }}"
          EXCEPTION="${{ steps.exception.outputs.granted }}"
          echo "Verdict: $VERDICT | Exception granted: ${EXCEPTION:-n/a}"
          if [ "$VERDICT" = "BLOCK" ] && [ "$EXCEPTION" != "true" ]; then
            echo "::error::Security gate BLOCKED this change. See the gate report."
            exit 1
          fi
          echo "Security gate passed (or exception granted)."
  # =========================================================================
  # Stage 6 — Supply Chain (Cosign signing + SPDX SBOM attestation)
  # Owner: DevSecOps. Runs only after the gate passes.
  # Week 2 populates this.
  # =========================================================================
  image-sign:
    name: Stage 6 — Cosign + SBOM
    runs-on: ubuntu-latest
    needs: [security-gate]
    permissions:
      contents: read
      packages: write      # push images to GHCR
      id-token: write       # Cosign keyless signing via OIDC
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Install Syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@v0

      - name: Build, push, sign, and attest each service
        run: |
          set -e
          REPO="ghcr.io/${GITHUB_REPOSITORY_OWNER}/secureflow"
          REPO=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')   # GHCR requires lowercase
          for svc in auth-service transaction-service frontend; do
            IMAGE="$REPO-$svc:${GITHUB_SHA}"
            echo "=== Building $IMAGE ==="
            docker build -t "$IMAGE" "./services/$svc"
            docker push "$IMAGE"

            # Capture the pushed digest (signing binds to the digest, not the tag)
            DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE" | cut -d@ -f2)
            REF="$REPO-$svc@$DIGEST"
            echo "=== Signing $REF (keyless) ==="
            cosign sign --yes "$REF"

            echo "=== Generating SBOM (SPDX) for $REF ==="
            syft "$REF" -o spdx-json > "sbom-$svc.spdx.json"

            echo "=== Attesting SBOM to $REF ==="
            cosign attest --yes --predicate "sbom-$svc.spdx.json" --type spdxjson "$REF"

            echo "=== Verifying signature ==="
            cosign verify "$REF" \
              --certificate-identity-regexp ".*" \
              --certificate-oidc-issuer-regexp ".*" \
              | head -5
          done

      - name: Upload SBOMs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sboms
          path: sbom-*.spdx.json
          retention-days: 30

  # =========================================================================
  # Stage 7 — Dynamic Application Security Testing (OWASP ZAP)
  # Owner: AppSec findings, DevSecOps tooling. Does NOT hard-fail on HIGH.
  # Findings route to the AppSec team via the security-gate PR comment.
  # Week 2 populates this.
