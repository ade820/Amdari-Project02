name: DevSecOps Pipeline

# Triggers — run on every push and PR to main.
# Adding more branches later (e.g. release/*) is one line each.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # =========================================================================
  # Stage 1 — Secret Scanning (Gitleaks)
  # Owner: DevSecOps. Hard-fail on any finding.
  # Day 3 populates this with full-history scanning and custom rules.
  # =========================================================================
  secret-scan:
    name: Stage 1 — Gitleaks (secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder
        run: echo "Stage 1 placeholder — Gitleaks comes Day 3"

  # =========================================================================
  # Stage 2 — Static Application Security Testing (SonarQube)
  # Owner: AppSec findings, DevSecOps tooling.
  # Differentiated gate: hard-fail only on CRITICAL/BLOCKER.
  # All other severities emit JSON for the gate to route via PR comment.
  # Day 3 populates this.
  # =========================================================================
  sast-scan:
    name: Stage 2 — SonarQube SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder
        run: echo "Stage 2 placeholder — SonarQube comes Day 3"

  # =========================================================================
  # Stage 3 — Container Image Scanning (Trivy)
  # Owner: DevSecOps. Hard-fail on CRITICAL/HIGH CVEs.
  # Day 4 populates this with three-service image builds and Trivy scan.
  # =========================================================================
  image-scan:
    name: Stage 3 — Trivy (image CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder
        run: echo "Stage 3 placeholder — Trivy image comes Day 4"

  # =========================================================================
  # Stage 4 — IaC Scanning (Trivy K8s + Checkov)
  # Owner: DevSecOps. Hard-fail on CRITICAL/HIGH misconfigurations.
  # Day 4 populates this.
  # =========================================================================
  iac-scan:
    name: Stage 4 — Trivy K8s + Checkov (IaC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder
        run: echo "Stage 4 placeholder — IaC scans come Day 4"

  # =========================================================================
  # Stage 5 — Security Gate (Aggregation + PR comment)
  # Aggregates all scanner JSON, splits by owner domain (DevSecOps vs AppSec),
  # posts a two-section PR comment, and hard-fails only when DevSecOps-owned
  # scanners report CRITICAL. Day 5 populates this.
  # =========================================================================
  security-gate:
    name: Stage 5 — Security Gate
    runs-on: ubuntu-latest
    needs: [secret-scan, sast-scan, image-scan, iac-scan]
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder
        run: echo "Stage 5 placeholder — security gate comes Day 5"

  # =========================================================================
  # Stage 6 — Supply Chain (Cosign signing + SPDX SBOM attestation)
  # Owner: DevSecOps. Runs only after the gate passes.
  # Week 2 populates this.
  # =========================================================================
  image-sign:
    name: Stage 6 — Cosign + SBOM
    runs-on: ubuntu-latest
    needs: [security-gate]
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder
        run: echo "Stage 6 placeholder — Cosign + SBOM come Week 2"

  # =========================================================================
  # Stage 7 — Dynamic Application Security Testing (OWASP ZAP)
  # Owner: AppSec findings, DevSecOps tooling. Does NOT hard-fail on HIGH.
  # Findings route to the AppSec team via the security-gate PR comment.
  # Week 2 populates this.
  # =========================================================================
  dast-scan:
    name: Stage 7 — OWASP ZAP DAST
    runs-on: ubuntu-latest
    needs: [image-sign]
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder
        run: echo "Stage 7 placeholder — ZAP comes Week 2"
