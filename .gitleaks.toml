[allowlist]
description = "Allowlist for documentation and evidence files"
regexes = [
    # Redacted secret values (scrubbed via git-filter-repo, Day 7). The literal
    # ***REMOVED*** marker is not a secret — it's the redaction placeholder left
    # where committed secrets used to be. Matching it prevents false positives
    # on key patterns (PASSWORD:, SECRET:) whose VALUE is already redacted.
    '''\*\*\*REMOVED\*\*\*''',
]
paths = [
    '''docs/.*''',
    '''evidence/.*''',
    '''reports/.*''',
    '''\.gitleaks\.toml''',
    '''README\.md''',
    '''VULNERABILITIES\.md''',
    # Day-6 K8s Secret manifest. Rotated values, not the leaked originals.
    # TEMPORARY: Day-7 hardening folds the DB password into Vault injection,
    # which deletes this file and makes this allowlist entry obsolete.
    '''infra/kubernetes/base/db-credentials\.yaml''',
    # CI workflow references secrets as ${VAR} runtime injections, never literals
    # (e.g. curl -u "${SONAR_TOKEN}:"). Variable references are not secrets.
    '''\.github/workflows/.*''',
]