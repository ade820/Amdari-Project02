apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: secureflow
  # CK-07 — missing required labels. (Day 7 hardening)
spec:
  replicas: 1
  selector:
    matchLabels:
      svc: auth-service
  template:
    metadata:
      labels:
        svc: auth-service
      annotations:
        # Vault Agent Injector — secrets mounted as a file, NOT env vars (CK-09 remediation)
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "auth-service"
        vault.hashicorp.com/agent-inject-secret-config: "secureflow/data/auth-service"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secureflow/data/auth-service" -}}
          export DB_PASSWORD="{{ .Data.data.DB_PASSWORD }}"
          export JWT_SECRET="{{ .Data.data.JWT_SECRET }}"
          export SESSION_SECRET="{{ .Data.data.SESSION_SECRET }}"
          {{- end -}}
    spec:
      serviceAccountName: auth-service
      containers:
        - name: auth-service
          # CK-06 — :latest tag. (Day 7 hardening)
          image: secureflow/auth-service:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - ". /vault/secrets/config && exec python app.py"
          ports:
            - containerPort: 5001
          env:
            - name: DB_HOST
              value: auth-db
            - name: DB_NAME
              value: authdb
            - name: DB_USER
              value: authuser
          # CK-04 — privileged container. (Day 7 hardening)
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
            runAsUser: 0
          # CK-05 — no resources. (Day 7 hardening)

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: secureflow
spec:
  selector:
    svc: auth-service
  ports:
    - port: 5001
      targetPort: 5001
