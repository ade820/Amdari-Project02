apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: secureflow
spec:
  replicas: 1
  selector:
    matchLabels:
      svc: frontend
  template:
    metadata:
      labels:
        svc: frontend
      annotations:
        # Vault Agent Injector — secrets as a file, NOT env vars (CK-09 remediation)
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "frontend"
        vault.hashicorp.com/agent-inject-secret-config: "secureflow/data/frontend"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secureflow/data/frontend" -}}
          export SESSION_SECRET="{{ .Data.data.SESSION_SECRET }}"
          export JWT_SECRET="{{ .Data.data.JWT_SECRET }}"
          {{- end -}}
    spec:
      serviceAccountName: frontend
      containers:
        - name: frontend
          image: secureflow/frontend:latest   # CK-06 (Day 7)
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - ". /vault/secrets/config && exec python app.py"
          ports:
            - containerPort: 5000
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: secureflow
spec:
  type: NodePort
  selector:
    svc: frontend
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30080
