apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-service
  namespace: secureflow
spec:
  replicas: 1
  selector:
    matchLabels:
      svc: transaction-service
  template:
    metadata:
      labels:
        svc: transaction-service
      annotations:
        # Vault Agent Injector — secrets as a file, NOT env vars (CK-09 remediation)
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "transaction-service"
        vault.hashicorp.com/agent-inject-secret-config: "secureflow/data/transaction-service"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secureflow/data/transaction-service" -}}
          export DB_PASSWORD="{{ .Data.data.DB_PASSWORD }}"
          export JWT_SECRET="{{ .Data.data.JWT_SECRET }}"
          {{- end -}}
    spec:
      serviceAccountName: transaction-service
      containers:
        - name: transaction-service
          image: secureflow/transaction-service:latest   # CK-06 (Day 7)
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - ". /vault/secrets/config && exec python app.py"
          ports:
            - containerPort: 5002
          env:
            - name: DB_HOST
              value: transaction-db
            - name: DB_NAME
              value: transactiondb
            - name: DB_USER
              value: txuser
          securityContext:
            privileged: true                # CK-04 (Day 7)
            allowPrivilegeEscalation: true  # CK-04 (Day 7)
            runAsUser: 0                    # CK-02 (Day 7)
          # CK-05 — no resources. (Day 7)
---
apiVersion: v1
kind: Service
metadata:
  name: transaction-service
  namespace: secureflow
spec:
  selector:
    svc: transaction-service
  ports:
    - port: 5002
      targetPort: 5002
