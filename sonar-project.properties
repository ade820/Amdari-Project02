# SonarCloud configuration for SecureFlow
# Maps to the project linked at https://sonarcloud.io/project/overview?id=ade820_Amdari-Project02

sonar.projectKey=ade820_Amdari-Project02
sonar.organization=ade820
sonar.host.url=https://sonarcloud.io

# Project naming for the SonarCloud UI
sonar.projectName=SecureFlow Banking Platform
sonar.projectVersion=1.0

# Sources — all three Python services. We deliberately scan the vulnerable
# baseline; the AV/TV/FV findings here are the AppSec-owned items the
# security gate will route, not block on.
sonar.sources=services/

# Tests — none yet in this baseline; required key so SonarCloud doesn't warn.
sonar.tests=

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions — don't scan our own evidence/docs that quote vulnerable
# code patterns. They are descriptive, not exploitable.
sonar.exclusions=evidence/**,docs/**,reports/**,screenshots/**
