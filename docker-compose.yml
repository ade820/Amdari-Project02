# SecureFlow docker-compose — INTENTIONALLY VULNERABLE.
# Planted vulnerabilities:
#   IV-01  hardcoded DB password
#   IV-02  databases exposed on host network (ports 5432, 5433)
#   IV-03  secrets in environment variables (SECRET_KEY, SESSION_SECRET, DB_PASSWORD)
#   IV-06  no resource limits
#   IV-07  no network segmentation between services
#   CK-03  postgres:14 used without digest pinning


services:
  auth-db:
    image: postgres:14
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: authuser
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-devpass_auth}
    ports:
      - "5432:5432"          # IV-02 — exposed on host.
    volumes:
      - ./db/auth/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - auth-db-data:/var/lib/postgresql/data

  transaction-db:
    image: postgres:14
    environment:
      POSTGRES_DB: transactiondb
      POSTGRES_USER: txuser
      POSTGRES_PASSWORD: ${TX_DB_PASSWORD:-devpass_tx}
    ports:
      - "5433:5432"          # IV-02 — exposed on host.
    volumes:
      - ./db/transaction/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - transaction-db-data:/var/lib/postgresql/data

  auth-service:
    build: ./services/auth-service
    environment:
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_NAME: authdb
      DB_USER: authuser
      DB_PASSWORD: ${AUTH_DB_PASSWORD:-devpass_auth}        # IV-01, IV-03 (prod: Vault-injected in K8s)
      JWT_SECRET: ${JWT_SECRET:-devjwt_shared} # AV-07, IV-03 (prod: Vault-injected in K8s)
    ports:
      - "5001:5001"
    depends_on:
      - auth-db

  transaction-service:
    build: ./services/transaction-service
    environment:
      DB_HOST: transaction-db
      DB_PORT: 5432
      DB_NAME: transactiondb
      DB_USER: txuser
      DB_PASSWORD: ${TX_DB_PASSWORD:-devpass_tx}           # IV-01, IV-03 (prod: Vault-injected in K8s)
      AUTH_SERVICE_URL: http://auth-service:5001
    ports:
      - "5002:5002"
    depends_on:
      - transaction-db
      - auth-service

  frontend:
    build: ./services/frontend
    environment:
      SESSION_SECRET: ${SESSION_SECRET:-devsession}           # FV-03, IV-03 (prod: Vault-injected in K8s)
      AUTH_SERVICE_URL: http://auth-service:5001
      TRANSACTION_SERVICE_URL: http://transaction-service:5002
    ports:
      - "5000:5000"
    depends_on:
      - auth-service
      - transaction-service

volumes:
  auth-db-data:
  transaction-db-data:

# IV-06 — no `deploy.resources.limits` on any service.
# IV-07 — no user-defined network isolation; everything on the default bridge.
